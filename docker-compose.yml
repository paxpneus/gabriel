services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Migrate (roda uma vez e sai) ───────────────────────────────────────
  migrate:
    build:
      context: .
      target: app
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    command: npx sequelize-cli db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  # ── 4. API (Express + BullBoard + filas/webhooks) ─────────────────────────
  api:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 5. Workers gerais (BlingOrder, CNPJ, NfE, MLSync, Reconcilers) ────────
  workers:
    build:
      context: .
      target: app
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      # Não expõe porta — só processa filas
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

  # ── 6. Worker de Scraping Mercado Livre (Playwright + Chromium) ───────────
  worker-scraping:
    build:
      context: .
      target: worker-scraping
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      ML_HEADLESS: "true"
      PORT: 3002
    # Sessão e downloads persistidos para evitar login repetido
    volumes:
      - ml_session:/app/ml_session
      - ml_downloads:/app/ml_downloads
    # Sandbox do Chromium precisa deste cap
    cap_add:
      - SYS_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  ml_session:
  ml_downloads:

networks:
  backend:
    driver: bridge